name: VueJS CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Install dependencies
        run: |
          npm ci

      - name: Build
        run: |
          npm run build

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: "node-modules-${{ hashFiles('package-lock.json') }}"

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Restore node modules from cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: "node-modules-${{ hashFiles('package-lock.json') }}"
      - name: Run Linter
        run: |
          npm run lint

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Restore node modules from cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: "node-modules-${{ hashFiles('package-lock.json') }}"

      - name: Run Tests
        run: |
          npm run test:unit